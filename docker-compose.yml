# Local Postgres for development (matches production adapter).
# Run: docker compose up -d
# Host port 5433 avoids clashing with a local Postgres on 5432 (Homebrew, etc.).
# DATABASE_URL in .env.example uses 5433 accordingly.

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: burlington
    volumes:
      - burlington_pgdata:/var/lib/postgresql/data

volumes:
  burlington_pgdata:

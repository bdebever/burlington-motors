# Local Postgres for development (matches production adapter).
# Run: docker compose up -d
# Then copy .env.example → .env and set DATABASE_URL to:
#   postgresql://postgres:devpass@127.0.0.1:5432/burlington

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: burlington
    volumes:
      - burlington_pgdata:/var/lib/postgresql/data

volumes:
  burlington_pgdata:
